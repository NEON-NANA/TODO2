<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>TODO-CARD2</title>
</head>
<body>
    <article data-testid="test-todo-card" id="todoCard">

  <!-- Checkbox -->
  <label>
    <input 
      type="checkbox" 
      data-testid="test-todo-complete-toggle"
      id="todoCheckbox"
    />
    Mark as complete
  </label>

  <!-- Priority Indicator -->
  <div 
    data-testid="test-todo-priority-indicator" 
    id="priorityIndicator"
    class="priority-indicator high"
  ></div>

  <!-- Title -->
  <h2 data-testid="test-todo-title" id="todoTitle">Frontend Task</h2>

  <!-- Collapsible Description -->
  <div 
    data-testid="test-todo-collapsible-section"
    id="collapsibleSection"
  >
    <p data-testid="test-todo-description" id="todoDescription">
      A well built Todo card component with proper accessibility and responsiveness.
    </p>
  </div>

  <button 
    data-testid="test-todo-expand-toggle"
    id="expandToggle"
    aria-expanded="false"
    aria-controls="collapsibleSection"
  >
    Expand
  </button>

  <!-- Priority -->
  <span data-testid="test-todo-priority" id="priorityText">High</span>

  <!-- Status Control -->
  <label for="statusControl">Status</label>
  <select 
    id="statusControl"
    data-testid="test-todo-status-control"
  >
    <option>Pending</option>
    <option>In Progress</option>
    <option>Done</option>
  </select>

  <!-- Status -->
  <div data-testid="test-todo-status" id="statusText">Pending</div>

  <!-- Due Date -->
  <time data-testid="test-todo-due-date" id="dueDate"></time>

  <!-- Time Remaining -->
  <time 
    data-testid="test-todo-time-remaining"
    id="timeRemaining"
    aria-live="polite"
  ></time>

  <!-- Overdue -->
  <div 
    data-testid="test-todo-overdue-indicator"
    id="overdueIndicator"
    hidden
  >
    Overdue
  </div>

  <!-- Actions -->
  <div class="actions">
    <button data-testid="test-todo-edit-button" id="editBtn">Edit</button>
    <button data-testid="test-todo-delete-button">Delete</button>
  </div>

  <!--  FORM -->
  <form 
    data-testid="test-todo-edit-form"
    id="editForm"
    hidden
  >
    <label for="editTitle">Title</label>
    <input id="editTitle" data-testid="test-todo-edit-title-input" />

    <label for="editDesc">Description</label>
    <textarea id="editDesc" data-testid="test-todo-edit-description-input"></textarea>

    <label for="editPriority">Priority</label>
    <select id="editPriority" data-testid="test-todo-edit-priority-select">
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <label for="editDate">Due Date</label>
    <input type="datetime-local" id="editDate" data-testid="test-todo-edit-due-date-input" />

    <button type="button" data-testid="test-todo-save-button" id="saveBtn">Save</button>
    <button type="button" data-testid="test-todo-cancel-button" id="cancelBtn">Cancel</button>
  </form>

</article>

<script src="index.js"></script>
</body>
</html>
